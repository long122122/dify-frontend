<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>审计访谈助手</title>
<style>
  body {
    font-family: "Microsoft YaHei", sans-serif;
    max-width: 800px;
    margin: 20px auto;
    padding: 0 20px;
  }
  textarea {
    width: 100%;
    height: 140px;
    margin: 10px 0;
    padding: 10px;
    font-size: 15px;
  }
  button {
    padding: 10px 24px;
    font-size: 16px;
    cursor: pointer;
    background: #2f54eb;
    color: #fff;
    border: none;
    border-radius: 6px;
  }
  button:hover {
    background: #2342c9;
  }
  #result {
    margin-top: 20px;
    white-space: pre-wrap;
    background: #f5f5f5;
    padding: 15px;
    border-radius: 6px;
    min-height: 120px;
  }
</style>
</head>
<body>
<h2>审计访谈助手</h2>
<textarea id="inputText" placeholder="请输入访谈内容，例如：被访谈人姓名、岗位、问题、回答..."></textarea>
<button id="sendBtn">提交分析</button>
<div id="result"></div>

<script>
  // 前端走 ESA 代理，不要写死后端域名和密钥
  const API_URL = "/api/workflows/run";

  document.getElementById("sendBtn").addEventListener("click", async () => {
    const input = document.getElementById("inputText").value.trim();
    const resultBox = document.getElementById("result");

    if (!input) {
      resultBox.textContent = "请输入访谈内容";
      return;
    }

    resultBox.textContent = "请求中...";
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
          // ⚠️ 前端不写 Authorization，由 ESA 边缘函数统一加
        },
        body: JSON.stringify({
          inputs: {
            content: input
          },
          response_mode: "streaming",
          user: "audit-user"
        })
      });

      if (!res.ok) {
        throw new Error("HTTP " + res.status);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let result = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        result += chunk;
        resultBox.textContent = result;
      }
    } catch (e) {
      resultBox.textContent = "错误：" + e.message;
    }
  });
</script>
</body>
</html>
